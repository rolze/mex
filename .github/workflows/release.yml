name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-mex:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mex

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mex/target
          key: ${{ runner.os }}-musl-cargo-${{ hashFiles('mex/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-musl-cargo-

      - name: Build release binary (musl)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare binary
        run: |
          strip target/x86_64-unknown-linux-musl/release/mex
          cp target/x86_64-unknown-linux-musl/release/mex mex-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mex-linux-x86_64
          path: mex/mex-linux-x86_64

  build-sem:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sem

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install GTK4 / libadwaita dev headers
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sem/target
          key: ${{ runner.os }}-sem-cargo-${{ hashFiles('sem/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-sem-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Prepare binary
        run: |
          strip target/release/sem
          cp target/release/sem sem-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sem-linux-x86_64
          path: sem/sem-linux-x86_64

  build-sem-vips:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sem

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install GTK4 / libadwaita / libvips dev headers
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libvips-dev

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sem/target
          key: ${{ runner.os }}-sem-vips-cargo-${{ hashFiles('sem/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-sem-vips-cargo-

      - name: Build release binary (vips)
        run: cargo build --release --features vips

      - name: Prepare binary
        run: |
          strip target/release/sem
          cp target/release/sem sem-linux-x86_64-vips

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sem-linux-x86_64-vips
          path: sem/sem-linux-x86_64-vips

  create-release:
    runs-on: ubuntu-latest
    needs: [build-mex, build-sem, build-sem-vips]
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mex-linux-x86_64
            artifacts/sem-linux-x86_64
            artifacts/sem-linux-x86_64-vips
          generate_release_notes: true
