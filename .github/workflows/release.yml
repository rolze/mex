name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: mex

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mex/target
          key: ${{ runner.os }}-musl-cargo-${{ hashFiles('mex/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-musl-cargo-

      - name: Build release binary (musl)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare binary
        run: |
          strip target/x86_64-unknown-linux-musl/release/mex
          cp target/x86_64-unknown-linux-musl/release/mex mex-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mex/mex-linux-x86_64
          generate_release_notes: true
